name: Deployment continu

on:
  push:
    tags:
      - 'Rubrica-v*'
      - 'v*'

jobs:
  test:
    name: Validate before release
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore evaluation.sln

      - name: Build solution
        run: dotnet build evaluation.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test GradingTool.Tests/GradingTool.Tests.csproj --no-build --configuration Release --verbosity normal

  publish:
    name: Publish release assets
    runs-on: windows-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Read application version
        id: app_version
        shell: pwsh
        run: |
          [xml]$project = Get-Content 'GradingTool/GradingTool.csproj'
          $version = $project.Project.PropertyGroup.Version | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw 'Version not found in GradingTool.csproj'
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Sync installer version
        shell: pwsh
        run: |
          $setupPath = 'GradingTool/installer/setup.iss'
          $content = Get-Content $setupPath -Raw
          $updated = $content -replace 'AppVersion=.*', 'AppVersion=${{ steps.app_version.outputs.version }}'
          Set-Content -Path $setupPath -Value $updated -Encoding utf8

      - name: Publish WPF app
        run: dotnet publish GradingTool/GradingTool.csproj --configuration Release --runtime win-x64 --self-contained true --output publish

      - name: Create self-contained archive
        shell: pwsh
        run: Compress-Archive -Path publish\* -DestinationPath Rubrica-${{ steps.app_version.outputs.version }}-win-x64-self-contained.zip

      - name: Build Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: GradingTool/installer/setup.iss

      - name: Upload published files
        uses: actions/upload-artifact@v4
        with:
          name: rubrica-${{ steps.app_version.outputs.version }}-${{ github.ref_name }}
          path: |
            publish/
            Rubrica-${{ steps.app_version.outputs.version }}-win-x64-self-contained.zip
            GradingTool/installer/Rubrica-Setup.exe

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Rubrica ${{ steps.app_version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          files: |
            GradingTool/installer/Rubrica-Setup.exe
            Rubrica-${{ steps.app_version.outputs.version }}-win-x64-self-contained.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
