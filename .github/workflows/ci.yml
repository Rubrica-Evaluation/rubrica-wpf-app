name: Integration continue

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build and test .NET solution
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore evaluation.sln

      - name: Build solution
        run: dotnet build evaluation.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test GradingTool.Tests/GradingTool.Tests.csproj --no-build --configuration Release --verbosity normal --logger trx --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/
